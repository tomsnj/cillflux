---
# Replaces kerberos-minio-mirror.
# Prunes recordings and snapshots older than RETENTION_DAYS from NFS directly.
# Runs nightly at 02:00. Adjust RETENTION_DAYS to taste (default: 7).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kerberos-retention
  namespace: kerberos
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: retention
              image: busybox:latest
              env:
                - name: RETENTION_DAYS
                  value: "7"
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  CAMERAS="barnSouth barnNorth backdoor barnCharmer"
                  for CAM in $CAMERAS; do
                    echo "=== Pruning $CAM (older than ${RETENTION_DAYS} days) ==="
                    find /data/${CAM}/recordings -type f -mtime +${RETENTION_DAYS} -print -delete
                    find /data/${CAM}/snapshots  -type f -mtime +${RETENTION_DAYS} -print -delete
                    find /data/${CAM}/recordings -mindepth 1 -type d -empty -delete
                    find /data/${CAM}/snapshots  -mindepth 1 -type d -empty -delete
                  done
                  echo "=== Retention complete ==="
              volumeMounts:
                - name: kerberos-data
                  mountPath: /data
          volumes:
            - name: kerberos-data
              persistentVolumeClaim:
                claimName: kerberos-data
