---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: blakeblackshear
  namespace: frigate
spec:
  interval: 12h
  url: https://blakeblackshear.github.io/blakeshome-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate
  namespace: frigate
spec:
  interval: 30m
  chart:
    spec:
      chart: frigate
      version: ">=7.0.0 <8.0.0"
      sourceRef:
        kind: HelmRepository
        name: blakeblackshear
        namespace: frigate
      interval: 12h
  values:
    image:
      repository: ghcr.io/blakeblackshear/frigate
      tag: stable

    # Inject RTSP credentials from SOPS secret as env vars
    # Frigate resolves {FRIGATE_*} placeholders in config.yaml at runtime
    envFrom:
      - secretRef:
          name: frigate-secret

    # Frigate config — cameras connect via go2rtc restream for efficiency.
    # go2rtc opens one connection per camera; record + detect + live view
    # all draw from the internal restream rather than hitting the camera directly.
    # Tapo cameras are accessed at their direct LAN IPs (not the router-forwarded
    # ports, which were only needed by Kerberos Agent running outside the cluster).
    config: |
      # Authentication for the Frigate web UI
      auth:
        enabled: true

      # go2rtc: one connection per camera, restreamed internally
      go2rtc:
        streams:
          barnSouth:
            - rtsp://gsfarmTapoBarn1:{FRIGATE_RTSP_PASSWORD}@10.0.0.88:554/stream1
          barnNorth:
            - rtsp://gsfarmTapoBarn2:{FRIGATE_RTSP_PASSWORD}@10.0.0.97:554/stream1
          backdoor:
            - rtsp://gsfarm:{FRIGATE_RTSP_PASSWORD}@10.0.0.91:554/stream1
          barnCharmer:
            - rtsp://gsfarm:{FRIGATE_RTSP_PASSWORD}@10.0.0.92:554/stream1
          # Low-res substreams for detect (less CPU than decoding the full stream)
          barnSouth_sub:
            - rtsp://gsfarmTapoBarn1:{FRIGATE_RTSP_PASSWORD}@10.0.0.88:554/stream2
          barnNorth_sub:
            - rtsp://gsfarmTapoBarn2:{FRIGATE_RTSP_PASSWORD}@10.0.0.97:554/stream2
          backdoor_sub:
            - rtsp://gsfarm:{FRIGATE_RTSP_PASSWORD}@10.0.0.91:554/stream2
          barnCharmer_sub:
            - rtsp://gsfarm:{FRIGATE_RTSP_PASSWORD}@10.0.0.92:554/stream2

      # Object detection disabled initially — CPU-only, no Coral/GPU yet.
      # Enable and tune once cameras are confirmed recording cleanly.
      detectors:
        cpu1:
          type: cpu
          num_threads: 2

      # Global record defaults — all recordings retained, continuous.
      # Mode: all = record everything, not just motion events.
      # This gives you the "what was on the other cameras at that moment" use case.
      record:
        enabled: true
        retain:
          days: 7
          mode: all
        events:
          retain:
            default: 30
            mode: motion

      snapshots:
        enabled: true
        retain:
          default: 30

      # Disable MQTT — not running a broker, not needed for basic recording/review
      mqtt:
        enabled: false

      # Global detect defaults — disabled until you want motion/object detection
      detect:
        enabled: false

      cameras:
        barnSouth:
          ffmpeg:
            inputs:
              - path: rtsp://127.0.0.1:8554/barnSouth
                input_args: preset-rtsp-generic
                roles:
                  - record
              - path: rtsp://127.0.0.1:8554/barnSouth_sub
                input_args: preset-rtsp-generic
                roles:
                  - detect
          detect:
            enabled: false
            width: 640
            height: 360
            fps: 5

        barnNorth:
          ffmpeg:
            inputs:
              - path: rtsp://127.0.0.1:8554/barnNorth
                input_args: preset-rtsp-generic
                roles:
                  - record
              - path: rtsp://127.0.0.1:8554/barnNorth_sub
                input_args: preset-rtsp-generic
                roles:
                  - detect
          detect:
            enabled: false
            width: 640
            height: 360
            fps: 5

        backdoor:
          ffmpeg:
            inputs:
              - path: rtsp://127.0.0.1:8554/backdoor
                input_args: preset-rtsp-generic
                roles:
                  - record
              - path: rtsp://127.0.0.1:8554/backdoor_sub
                input_args: preset-rtsp-generic
                roles:
                  - detect
          detect:
            enabled: false
            width: 640
            height: 360
            fps: 5

        barnCharmer:
          ffmpeg:
            inputs:
              - path: rtsp://127.0.0.1:8554/barnCharmer
                input_args: preset-rtsp-generic
                roles:
                  - record
              - path: rtsp://127.0.0.1:8554/barnCharmer_sub
                input_args: preset-rtsp-generic
                roles:
                  - detect
          detect:
            enabled: false
            width: 640
            height: 360
            fps: 5

    # Persist recordings and the Frigate SQLite database to NFS
    persistence:
      media:
        enabled: true
        existingClaim: frigate-media
      # Separate small PVC for the SQLite DB — keeps it off NFS for performance
      # (NFS + SQLite under write load can cause locking issues)
      data:
        enabled: true
        storageClass: gsks0
        accessMode: ReadWriteOnce
        size: 5Gi

    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 4000m
        memory: 4Gi

    # Internal ingress only — frigate.gs-farm.net via nginx-internal
    ingress:
      enabled: true
      ingressClassName: internal
      annotations:
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
      hosts:
        - host: frigate.gs-farm.net
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - frigate.gs-farm.net
