---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: 1.19.2
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    ui:
      enabled: true
      rollOutPods: true
      ingress:
        enabled: true
        className: internal
        annotations:
          hajimari.io/icon: simple-icons:cilium
        hosts:
          - "hubble.${SECRET_DOMAIN}"
        tls:
          - hosts:
              - "hubble.${SECRET_DOMAIN}"
  valuesFrom:
    - name: cilium-values
      kind: ConfigMap
      valuesKey: values.yaml
