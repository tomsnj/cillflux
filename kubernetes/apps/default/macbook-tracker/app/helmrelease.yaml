---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: macbook-tracker
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: "3.*"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      macbook-tracker:
        containers:
          app:
            image:
              repository: nginx
              tag: alpine
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true

    service:
      app:
        controller: macbook-tracker
        ports:
          http:
            port: 80

    ingress:
      internal:
        className: nginx-internal
        annotations:
          external-dns.alpha.kubernetes.io/target: external.gs-farm.net
          kubernetes.io/ingress.class: internal
          kubernetes.io/tls-acme: "true"
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          cert-manager.io/cluster-issuer: "letsencrypt-production"
        hosts:
          - host: &internalHost mactrack-int.gs-farm.net
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *internalHost
            secretName: mactrack-int-tls
      external:
        className: nginx-external
        annotations:
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          external-dns.alpha.kubernetes.io/target: external.gs-farm.net
          kubernetes.io/ingress.class: internal
          kubernetes.io/tls-acme: "true"
          cert-manager.io/cluster-issuer: "letsencrypt-production"
        hosts:
          - host: &externalHost mactrack.gs-farm.net
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *externalHost
            secretName: mactrack-tls

    persistence:
      html:
        type: configMap
        name: macbook-tracker-html
        globalMounts:
          - path: /usr/share/nginx/html/index.html
            subPath: index.html
            readOnly: true
