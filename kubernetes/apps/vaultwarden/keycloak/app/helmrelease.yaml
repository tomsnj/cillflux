# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  annotations:
    patch.sko.ai/app-template: common
  name: &app keycloak
spec:
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s-labs
        namespace: flux-system
      version: 4.6.2
  interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: local-path-provisioner
      namespace: storage
  values:
    controllers:
      keycloak:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: quay.io/keycloak/keycloak
              tag: "26.5.4"
            env:
              - name: TZ
                value: ${TIMEZONE}
              - name: KC_HOSTNAME
                value: "https://elvis.${SECRET_DOMAIN}"
              - name: KC_HOSTNAME_ADMIN
                value: "https://auth-console.${SECRET_DOMAIN}"
              - name: KC_DB
                value: postgres
              - name: KC_DB_URL
                valueFrom:
                  secretKeyRef:
                    name: postgres-infra-local-pguser-keycloak
                    key: jdbc-uri
              KC_DB_URL: jdbc:postgresql://postgres-infra-local-ha.infrastructure.svc.cluster.local:5432/keycloak
              - name: KC_DB_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: postgres-infra-local-pguser-keycloak
                    key: user
              - name: KC_DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: postgres-infra-local-pguser-keycloak
                    key: password
              - name: KC_FEATURES
                value: "passkeys,scripts,update-email"
              - name: KC_PROXY_HEADERS
                value: "xforwarded"
              - name: KC_HTTP_ENABLED
                value: "true"
              - name: KC_HEALTH_ENABLED
                value: "true"
              - name: KC_SPI_CORS_ENABLED
                value: "true"
              - name: KC_CACHE
                value: "ispn"
              - name: POD_ID
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP
              - name: KC_CACHE_EMBEDDED_NETWORK_BIND_ADDRESS
                value: "$$(POD_ID)"
              - name: KC_SPI_CORS_ORIGINS
                value: "*"
              - name: KC_SPI_CORS_METHODS
                value: "GET,HEAD,OPTIONS,POST,PUT,DELETE"
              - name: KC_SPI_CORS_HEADERS
                value: "Authorization,Content-Type,Accept,Origin,X-Requested-With"
              - name: KC_SPI_CORS_EXPOSED_HEADERS
                value: "Content-Disposition,Content-Length,Content-Type"
              - name: KC_SPI_CORS_ALLOW_CREDENTIALS
                value: "true"
              - name: KC_SPI_CORS_MAX_AGE
                value: "3600"
              - name: JAVA_OPTS_APPEND
                value: "-Djgroups.dns.query=keycloak.vaultwarden.svc.cluster.local"
#              KC_FEATURES: passkeys,scripts,update-email
#              KC_PROXY_HEADERS: "xforwarded"
#              KC_HTTP_ENABLED: "true"
#              KC_HEALTH_ENABLED: "true"
#              KC_SPI_CORS_ENABLED: "true"
#              KC_CACHE: "ispn"
#              POD_ID:
#                valueFrom:
#                  fieldRef:
#                    fieldPath: status.podIP
#              KC_CACHE_EMBEDDED_NETWORK_BIND_ADDRESS: "$${POD_ID}"
#              KC_SPI_CORS_ORIGINS: "*"
#              KC_SPI_CORS_METHODS: "GET,HEAD,OPTIONS,POST,PUT,DELETE"
#              KC_SPI_CORS_HEADERS: "Authorization,Content-Type,Accept,Origin,X-Requested-With"
#              KC_SPI_CORS_EXPOSED_HEADERS: "Content-Disposition,Content-Length,Content-Type"
#              KC_SPI_CORS_ALLOW_CREDENTIALS: "true"
#              KC_SPI_CORS_MAX_AGE: "3600"
#              JAVA_OPTS_APPEND: "-Djgroups.dns.query=keycloak.vaultwarden.svc.cluster.local"
            envFrom:
              - secretRef:
                  name: keycloak-admin-secret
            args:
              - "start"

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/live
                    port: 9000
                  periodSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/ready
                    port: 9000
                  periodSeconds: 10
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/started
                    port: 9000
                  periodSeconds: 1
                  failureThreshold: 600
            resources:
              limits:
                cpu: 1000m
                memory: 1Gi
              requests:
                cpu: 100m
                memory: 256Mi

    service:
      app:
        controller: *app
        ports:
          http:
            port: 8080
