---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-backup-health
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  backup-health.json: |
    {
      "title": "Backup Health",
      "uid": "backup-health",
      "tags": [
        "backups"
      ],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "5m",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "panels": [
        {
          "type": "stat",
          "title": "Jobs Healthy",
          "id": 1,
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "unit": "short"
            }
          },
          "targets": [
            {
              "expr": "count(backup_success{job=\"storage1-node-exporter\"} == 1)",
              "refId": "A",
              "legendFormat": "Healthy"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Jobs Failing",
          "id": 2,
          "gridPos": {
            "x": 6,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "unit": "short"
            }
          },
          "targets": [
            {
              "expr": "count(backup_success{job=\"storage1-node-exporter\"} == 0)",
              "refId": "A",
              "legendFormat": "Failing"
            }
          ]
        },
        {
          "type": "table",
          "title": "Backup Status",
          "id": 3,
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "options": {
            "footer": {
              "show": false
            }
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "left",
                "displayMode": "auto"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Value #A"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Status"
                  },
                  {
                    "id": "custom.displayMode",
                    "value": "color-background"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "0": {
                            "text": "FAILING",
                            "color": "red"
                          },
                          "1": {
                            "text": "OK",
                            "color": "green"
                          }
                        }
                      }
                    ]
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Value #B"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Days Since Backup"
                  },
                  {
                    "id": "custom.displayMode",
                    "value": "color-background"
                  },
                  {
                    "id": "color",
                    "value": {
                      "mode": "thresholds"
                    }
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "green",
                          "value": null
                        },
                        {
                          "color": "yellow",
                          "value": 2
                        },
                        {
                          "color": "red",
                          "value": 7
                        }
                      ]
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "backup_job"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Job"
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "job"
                },
                "properties": [
                  {
                    "id": "custom.hidden",
                    "value": true
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "instance"
                },
                "properties": [
                  {
                    "id": "custom.hidden",
                    "value": true
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Time"
                },
                "properties": [
                  {
                    "id": "custom.hidden",
                    "value": true
                  }
                ]
              }
            ]
          },
          "transformations": [
            {
              "id": "joinByField",
              "options": {
                "byField": "exported_job",
                "mode": "outer"
              }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "__name__": true,
                  "__name__ 1": true,
                  "__name__ 2": true,
                  "Time": true,
                  "Time 1": true,
                  "Time 2": true,
                  "job": true,
                  "job 1": true,
                  "job 2": true,
                  "instance": true,
                  "instance 1": true,
                  "instance 2": true
                },
                "renameByName": {
                  "exported_job": "Job",
                  "Value #A": "Status",
                  "Value #B": "Days Since Backup"
                }
              }
            }
          ],
          "targets": [
            {
              "expr": "backup_success{job=\"storage1-node-exporter\"}",
              "refId": "A",
              "instant": true,
              "format": "table",
              "legendFormat": ""
            },
            {
              "expr": "backup_last_success_days{job=\"storage1-node-exporter\"}",
              "refId": "B",
              "instant": true,
              "format": "table",
              "legendFormat": ""
            }
          ]
        },
        {
          "type": "bargauge",
          "title": "Days Since Last Backup",
          "id": 4,
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 2
                  },
                  {
                    "color": "red",
                    "value": 7
                  }
                ]
              },
              "unit": "short",
              "min": 0,
              "max": 14
            }
          },
          "targets": [
            {
              "expr": "backup_last_success_days{job=\"storage1-node-exporter\"}",
              "refId": "A",
              "instant": true,
              "legendFormat": "{{backup_job}}"
            }
          ]
        }
      ]
    }
